name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Blocking: the typecheck backlog has been cleared (0 errors). The script
      # builds the lib/db + lib/api-zod project refs before checking api-server.
      - name: Typecheck (api-server)
        run: pnpm --filter @workspace/api-server typecheck

      - name: Test (api-server)
        run: pnpm --filter @workspace/api-server test
