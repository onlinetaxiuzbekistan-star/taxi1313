<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Current driver shell (web)</title>
<!--
  Faithful static reproduction of the CURRENT web driver shell.
  Markup + Tailwind classNames + design tokens + lucide icons are copied
  verbatim from artifacts/taxi-app/src/pages/driver/DriverLayout.tsx and
  src/index.css (.driver-theme[data-theme="dark"]). This renders the exact same
  component the live WebView APK shows, for side-by-side comparison with the new
  React Native shell.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: "hsl(240 48% 7%)",
          foreground: "hsl(220 15% 90%)",
          card: "hsl(240 30% 12% / <alpha-value>)",
          primary: "hsl(189 74% 48% / <alpha-value>)",
          "primary-foreground": "hsl(0 0% 100%)",
          secondary: "hsl(240 20% 17%)",
          muted: "hsl(240 20% 17%)",
          "muted-foreground": "hsl(240 5% 60% / <alpha-value>)",
          border: "hsl(240 18% 20% / <alpha-value>)",
        },
        fontFamily: {
          sans: ["'DM Sans'", "sans-serif"],
          display: ["'Outfit'", "sans-serif"],
          mono: ["ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
        },
      },
    },
  };
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; background: hsl(240 48% 7%); }
  body { font-family: "DM Sans", sans-serif; }
  .phone { width: 390px; height: 844px; overflow: hidden; display: flex; flex-direction: column; background: hsl(240 48% 7%); }
</style>
</head>
<body>
  <div class="phone">
    <!-- HEADER (DriverLayout.tsx lines 437-497) -->
    <header class="bg-card/95 border-b border-white/[0.06]">
      <div class="flex items-center justify-between gap-2.5 px-3 h-14">
        <div class="flex items-center gap-1.5">
          <a class="flex items-center gap-1.5 bg-white/[0.06] px-2 py-1 rounded-lg shrink-0">
            <div class="w-5 h-5 rounded-full bg-primary/15 flex items-center justify-center">
              <i data-lucide="user" class="w-3 h-3 text-primary"></i>
            </div>
            <span class="text-[13px] font-extrabold font-mono text-foreground tracking-wide">BUX-001</span>
          </a>
          <a class="flex items-center gap-1 px-2 py-1 rounded-lg border shrink-0 bg-zinc-900 border-zinc-700 text-white">
            <i data-lucide="wallet" class="w-3.5 h-3.5 shrink-0"></i>
            <span class="text-[13px] font-extrabold tracking-tight tabular-nums">152 000</span>
            <span class="text-[9px] font-bold opacity-70 shrink-0">сум</span>
          </a>
        </div>
        <div class="flex items-center gap-1.5 shrink-0">
          <button class="flex items-center gap-1.5 h-8 pl-2.5 pr-2 rounded-full bg-emerald-500 text-white shadow-sm shadow-emerald-500/30 border border-emerald-600">
            <div class="w-1.5 h-1.5 rounded-full bg-white"></div>
            <span class="text-[11px] font-bold">Online</span>
            <i data-lucide="power" class="w-3.5 h-3.5"></i>
          </button>
          <button class="flex items-center justify-center w-8 h-8 rounded-full bg-red-500/10 border border-red-500/30 text-red-500">
            <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- BODY (neutral empty state, mirrors the new app's Orders tab) -->
    <main class="flex-1 bg-background flex flex-col items-center justify-center px-8">
      <div class="w-20 h-20 rounded-2xl bg-primary/[0.12] flex items-center justify-center mb-5">
        <i data-lucide="briefcase" class="w-9 h-9 text-primary"></i>
      </div>
      <div class="font-display font-semibold text-foreground text-xl mb-2">Заказы</div>
      <div class="text-muted-foreground text-sm">Нет доступных заказов</div>
    </main>

    <!-- BOTTOM NAV (DriverLayout.tsx lines 666-731) -->
    <nav class="bg-card/95 border-t border-white/[0.06]" style="padding-bottom:12px;">
      <div class="flex justify-around items-center h-[68px] px-1">
        <!-- active: Заказы -->
        <div class="flex flex-col items-center justify-center w-full h-full gap-0.5 text-primary">
          <div class="relative w-8 h-8 rounded-lg flex items-center justify-center bg-primary/[0.12]">
            <i data-lucide="briefcase" class="w-5 h-5"></i>
          </div>
          <span class="text-[10px] font-semibold text-primary">Заказы</span>
        </div>
        <!-- Срочные badge 3 -->
        <div class="flex flex-col items-center justify-center w-full h-full gap-0.5 text-muted-foreground/70">
          <div class="relative w-8 h-8 rounded-lg flex items-center justify-center">
            <i data-lucide="zap" class="w-5 h-5"></i>
            <span class="absolute -top-1 -right-1 min-w-[16px] h-[16px] rounded-full bg-red-500 text-white text-[9px] font-bold flex items-center justify-center px-0.5">3</span>
          </div>
          <span class="text-[10px] font-semibold">Срочные</span>
        </div>
        <!-- Чат badge 2 -->
        <div class="flex flex-col items-center justify-center w-full h-full gap-0.5 text-muted-foreground/70">
          <div class="relative w-8 h-8 rounded-lg flex items-center justify-center">
            <i data-lucide="message-circle" class="w-5 h-5"></i>
            <span class="absolute -top-1 -right-1 min-w-[16px] h-[16px] rounded-full bg-red-500 text-white text-[9px] font-bold flex items-center justify-center px-0.5">2</span>
          </div>
          <span class="text-[10px] font-semibold">Чат</span>
        </div>
        <!-- Профиль -->
        <div class="flex flex-col items-center justify-center w-full h-full gap-0.5 text-muted-foreground/70">
          <div class="relative w-8 h-8 rounded-lg flex items-center justify-center">
            <i data-lucide="user" class="w-5 h-5"></i>
          </div>
          <span class="text-[10px] font-semibold">Профиль</span>
        </div>
      </div>
    </nav>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
