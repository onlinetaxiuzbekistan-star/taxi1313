<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Сброс кэша</title>
<style>body{background:#09090b;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}div{max-width:320px;padding:20px}h1{font-size:20px}p{color:#71717a;font-size:14px}</style>
</head><body><div>
<h1>Очистка...</h1>
<p id="m">Удаляем кэш и SW</p>
</div>
<script>
// @ts-nocheck

(async function(){
  var msg = document.getElementById('m');
  try {
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      for (var i=0;i<regs.length;i++) { try { await regs[i].unregister(); } catch(e){} }
      msg.textContent = 'SW удалены: '+regs.length;
    }
  } catch(e){}
  try {
    if ('caches' in window) {
      var keys = await caches.keys();
      for (var i=0;i<keys.length;i++) { try { await caches.delete(keys[i]); } catch(e){} }
    }
  } catch(e){}
  try { localStorage.setItem('erudaOn','1'); } catch(e){}
  msg.textContent = 'Готово, переходим...';
  setTimeout(function(){ location.replace('/driver?nocache=' + Date.now()); }, 600);
})();

</script>
</body></html>
