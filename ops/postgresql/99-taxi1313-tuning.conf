# PostgreSQL tuning for taxi1313 — 31 GiB host, modest DB size but expected to
# grow. The pg-defaults (shared_buffers=128MB, work_mem=4MB) are tiny for this
# box. Numbers follow the standard "25% RAM for shared_buffers, 75% for
# effective_cache_size" guideline + SSD-friendly cost weights.

shared_buffers = 8GB
effective_cache_size = 24GB
work_mem = 16MB
maintenance_work_mem = 2GB

wal_buffers = 64MB
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9

# SSD-aware planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Parallel query
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
